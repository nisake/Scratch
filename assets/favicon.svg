      <stop offset="0" stop-color="#d4d4d4"/>
      <stop offset="0.35" stop-color="#fafafa"/>
      <stop offset="0.6" stop-color="#b6b6b6"/>
      <stop offset="1" stop-color="#8c8c8c"/>
